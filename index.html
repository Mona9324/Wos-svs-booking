<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>2737 SVS Booking</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="snow"></canvas>

<header>

<h1>❄ 2737 SVS Booking</h1>
<div id="countdown"></div>

</header>

<div class="tabs">

<button onclick="switchBuff('monday')">Monday (Construction)</button> <button onclick="switchBuff('tuesday')">Tuesday (Research)</button> <button onclick="switchBuff('thursday')">Thursday (Training)</button>

</div>

<div class="slotStats">

<span class="availableDot"></span> <span id="availableCount">0</span>

<span class="reservedDot"></span> <span id="reservedCount">0</span>

</div>

<div id="slots" class="grid"></div>

<div id="modal" class="modal">

<div class="modalBox">

<h3>Reserve Slot</h3>

<input id="alliance" placeholder="Alliance">

<input id="player" placeholder="Player Name">

<input id="Speed-up" type="number" placeholder="Speed-up">

<input id="password" type="password" placeholder="Cancel Password">

<button onclick="confirmBooking()">Reserve</button> <button onclick="closeModal()">Cancel</button>

</div>

</div>

<div id="copyBox" class="copyBox">

<div id="copyText"></div>

<button onclick="copyDiscord()">Copy for Discord</button>

</div>

<button class="adminFloating" onclick="openAdmin()">⚙ Admin</button>

<div id="adminPanel" class="adminPanel">

<h3>관리자 메뉴</h3>

<div id="관리자 로그인">

<input id="adminPass" type="password" placeholder="Admin Password">
<button onclick="adminLogin()">Login</button>

</div>

<div id="adminControls">

<button onclick="setBooking(true)">🔓 예약 오픈</button> <button onclick="setBooking(false)">🔒 예약 잠금</button> <button onclick="clearAll()">🧹 슬롯 리셋</button>

</div>

<button onclick="closeAdmin()">Close</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script src="app.js"></script>

</body>
</html>
